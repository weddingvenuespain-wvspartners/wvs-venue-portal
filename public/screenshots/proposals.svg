<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#453D23" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#453D23" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="imgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2DDD4"/>
      <stop offset="100%" stop-color="#D4CFC6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" rx="16" fill="#F5F3ED"/>

  <!-- Sidebar hint -->
  <rect x="0" y="0" width="56" height="600" rx="16" fill="#2C2614"/>
  <rect x="16" y="0" width="40" height="600" fill="#2C2614"/>
  <circle cx="28" cy="32" r="10" fill="#796F4E" opacity="0.4"/>
  <rect x="18" y="64" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="84" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="104" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="124" width="20" height="3" rx="1.5" fill="#fff" opacity="0.6"/>
  <rect x="18" y="144" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>

  <!-- Header -->
  <text x="88" y="48" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#453D23">Propuestas</text>
  <rect x="736" y="26" width="134" height="34" rx="8" fill="#796F4E"/>
  <text x="755" y="48" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">+ Nueva propuesta</text>

  <!-- Proposal Card 1 - Featured/Large -->
  <rect x="88" y="76" width="400" height="494" rx="14" fill="#fff" stroke="#E2DDD4" stroke-width="1" filter="url(#shadow)"/>
  <!-- Image placeholder -->
  <rect x="100" y="88" width="376" height="180" rx="10" fill="url(#imgGrad)"/>
  <!-- Photo icon -->
  <rect x="250" y="155" width="64" height="44" rx="6" fill="#C5B9AA" opacity="0.6"/>
  <circle cx="270" cy="170" r="6" fill="#B0A593" opacity="0.6"/>
  <polygon points="250,199 290,172 314,199" fill="#B0A593" opacity="0.5"/>
  <!-- Proposal content -->
  <rect x="112" y="282" width="68" height="20" rx="4" fill="#eef6f0"/>
  <text x="124" y="296" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3d6b4a">Enviada</text>
  <text x="112" y="322" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#453D23">Sarah &amp; Michael</text>
  <text x="112" y="344" font-family="system-ui, sans-serif" font-size="12" fill="#9A8F78">Boda en Finca Los Olivos</text>
  <!-- Details grid -->
  <text x="112" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78" text-transform="uppercase" letter-spacing="0.08em">FECHA</text>
  <text x="112" y="396" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#453D23">15 Sep 2026</text>
  <text x="260" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">INVITADOS</text>
  <text x="260" y="396" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#453D23">120</text>
  <text x="360" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">PRESUPUESTO</text>
  <text x="360" y="396" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#453D23">35.000 EUR</text>
  <!-- Divider -->
  <line x1="112" y1="418" x2="464" y2="418" stroke="#E2DDD4" stroke-width="1"/>
  <!-- Stats row -->
  <circle cx="124" cy="442" r="3" fill="#796F4E"/>
  <text x="134" y="446" font-family="system-ui, sans-serif" font-size="11" fill="#9A8F78">8 visualizaciones</text>
  <text x="260" y="446" font-family="system-ui, sans-serif" font-size="11" fill="#9A8F78">Enviada hace 3 días</text>
  <!-- Action buttons -->
  <rect x="112" y="470" width="160" height="36" rx="8" fill="#453D23"/>
  <text x="148" y="493" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Ver propuesta</text>
  <rect x="284" y="470" width="100" height="36" rx="8" fill="#F5F3ED" stroke="#E2DDD4" stroke-width="1"/>
  <text x="306" y="493" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#453D23">Copiar</text>
  <!-- Views indicator -->
  <rect x="396" y="470" width="68" height="36" rx="8" fill="#F5F3ED" stroke="#E2DDD4" stroke-width="1"/>
  <text x="414" y="493" font-family="system-ui, sans-serif" font-size="12" fill="#9A8F78">Editar</text>

  <!-- Proposal Card 2 - Small -->
  <rect x="510" y="76" width="360" height="230" rx="14" fill="#fff" stroke="#E2DDD4" stroke-width="1" filter="url(#shadow)"/>
  <rect x="522" y="88" width="336" height="100" rx="10" fill="url(#imgGrad)"/>
  <rect x="655" y="120" width="64" height="44" rx="6" fill="#C5B9AA" opacity="0.6"/>
  <circle cx="675" cy="135" r="6" fill="#B0A593" opacity="0.6"/>
  <polygon points="655,164 695,137 719,164" fill="#B0A593" opacity="0.5"/>
  <rect x="522" y="200" width="60" height="20" rx="4" fill="#fef7ec"/>
  <text x="530" y="214" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8a6d2b">Borrador</text>
  <text x="522" y="240" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#453D23">Emma &amp; Charles</text>
  <text x="522" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#9A8F78">22 Jun 2026 · 80 invitados</text>
  <rect x="522" y="274" width="110" height="28" rx="6" fill="#453D23"/>
  <text x="546" y="293" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Ver propuesta</text>

  <!-- Proposal Card 3 - Small -->
  <rect x="510" y="320" width="360" height="130" rx="14" fill="#fff" stroke="#E2DDD4" stroke-width="1" filter="url(#shadow)"/>
  <rect x="522" y="332" width="80" height="80" rx="10" fill="url(#imgGrad)"/>
  <rect x="540" y="354" width="36" height="28" rx="4" fill="#C5B9AA" opacity="0.6"/>
  <rect x="618" y="340" width="60" height="20" rx="4" fill="#eef6f0"/>
  <text x="626" y="354" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3d6b4a">Enviada</text>
  <text x="618" y="378" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#453D23">Laura &amp; Roberto</text>
  <text x="618" y="398" font-family="system-ui, sans-serif" font-size="12" fill="#9A8F78">8 Oct 2026 · 150 invitados</text>
  <circle cx="630" cy="424" r="3" fill="#796F4E"/>
  <text x="640" y="428" font-family="system-ui, sans-serif" font-size="11" fill="#9A8F78">12 visualizaciones</text>

  <!-- Proposal Card 4 - Small -->
  <rect x="510" y="464" width="360" height="106" rx="14" fill="#fff" stroke="#E2DDD4" stroke-width="1" filter="url(#shadow)"/>
  <rect x="522" y="476" width="80" height="80" rx="10" fill="url(#imgGrad)"/>
  <rect x="540" y="498" width="36" height="28" rx="4" fill="#C5B9AA" opacity="0.6"/>
  <rect x="618" y="484" width="70" height="20" rx="4" fill="#f0eeec"/>
  <text x="626" y="498" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b8580">Aceptada</text>
  <text x="618" y="522" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#453D23">Ana &amp; David</text>
  <text x="618" y="542" font-family="system-ui, sans-serif" font-size="12" fill="#9A8F78">5 May 2026 · 200 invitados</text>
</svg>