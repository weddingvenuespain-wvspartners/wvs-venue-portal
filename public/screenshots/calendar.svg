  <!-- Week 1 (starts Tuesday) -->
  <!-- Sep 1 Tue -->
  <text x="246" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">1</text>
  <!-- Sep 2 -->
  <text x="358" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">2</text>
  <!-- Sep 3 -->
  <text x="470" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">3</text>
  <!-- Sep 4 -->
  <text x="582" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">4</text>
  <!-- Sep 5 - Negociación -->
  <rect x="662" y="178" width="64" height="56" rx="8" fill="#fef7ec" stroke="#f5deb3" stroke-width="1"/>
  <text x="694" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8a6d2b" text-anchor="middle">5</text>
  <text x="694" y="218" font-family="system-ui, sans-serif" font-size="8" fill="#8a6d2b" text-anchor="middle">E &amp; C</text>
  <!-- Sep 6 -->
  <text x="806" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">6</text>

  <!-- Week 2 -->
  <text x="134" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">7</text>
  <text x="246" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">8</text>
  <text x="358" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">9</text>
  <text x="470" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">10</text>
  <text x="582" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">11</text>
  <!-- Sep 12 - Reservado -->
  <rect x="662" y="242" width="64" height="56" rx="8" fill="#eef6f0" stroke="#c3dfc9" stroke-width="1"/>
  <text x="694" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3d6b4a" text-anchor="middle">12</text>
  <text x="694" y="282" font-family="system-ui, sans-serif" font-size="8" fill="#3d6b4a" text-anchor="middle">L &amp; R</text>
  <text x="806" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">13</text>

