  <text x="134" y="454" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">28</text>
  <text x="246" y="454" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">29</text>
  <text x="358" y="454" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">30</text>

  <!-- Summary bar -->
  <rect x="100" y="488" width="758" height="68" rx="10" fill="#F5F3ED"/>
  <!-- Free -->
  <circle cx="134" cy="522" r="6" fill="#c5b9aa"/>
  <text x="148" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#453D23">22</text>
  <text x="148" y="534" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">libres</text>
  <!-- Negociación -->
  <circle cx="300" cy="522" r="6" fill="#d4a24c"/>
  <text x="314" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#453D23">3</text>
  <text x="314" y="534" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">en negociación</text>
  <!-- Reservado -->
  <circle cx="490" cy="522" r="6" fill="#5a9e6b"/>
  <text x="504" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#453D23">4</text>
  <text x="504" y="534" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">reservados</text>
  <!-- Bloqueado -->
  <circle cx="660" cy="522" r="6" fill="#a8a3a0"/>
  <text x="674" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#453D23">1</text>
  <text x="674" y="534" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">bloqueado</text>
</svg>