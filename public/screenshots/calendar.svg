  <rect x="662" y="306" width="64" height="56" rx="8" fill="#f0eeec" stroke="#d6d2ce" stroke-width="1"/>
  <text x="694" y="326" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b8580" text-anchor="middle">19</text>
  <text x="694" y="346" font-family="system-ui, sans-serif" font-size="8" fill="#8b8580" text-anchor="middle">Bloqueado</text>
