<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#453D23" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" rx="16" fill="#F5F3ED"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="56" height="600" rx="16" fill="#2C2614"/>
  <rect x="16" y="0" width="40" height="600" fill="#2C2614"/>
  <circle cx="28" cy="32" r="10" fill="#796F4E" opacity="0.4"/>
  <rect x="18" y="64" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="84" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="104" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="124" width="20" height="3" rx="1.5" fill="#796F4E" opacity="0.25"/>
  <rect x="18" y="144" width="20" height="3" rx="1.5" fill="#fff" opacity="0.6"/>

  <!-- Header -->
  <text x="88" y="48" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#453D23">Calendario</text>

  <!-- Month nav -->
  <rect x="88" y="68" width="782" height="50" rx="10" fill="#fff" stroke="#E2DDD4" stroke-width="1" filter="url(#shadow)"/>
  <text x="106" y="98" font-family="system-ui, sans-serif" font-size="15" font-weight="300" fill="#9A8F78">&lt;</text>
  <text x="380" y="99" font-family="'Georgia', serif" font-size="20" font-weight="700" fill="#453D23" text-anchor="middle">Septiembre 2026</text>
  <text x="654" y="98" font-family="system-ui, sans-serif" font-size="15" font-weight="300" fill="#9A8F78">&gt;</text>

  <!-- Legend -->
  <circle cx="700" cy="93" r="5" fill="#c5b9aa"/>
  <text x="712" y="97" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">Libre</text>
  <circle cx="762" cy="93" r="5" fill="#d4a24c"/>
  <text x="774" y="97" font-family="system-ui, sans-serif" font-size="10" fill="#9A8F78">Negociación</text>
  <circle cx="852" cy="93" r="5" fill="#5a9e6b"/>

  <!-- Calendar grid -->
  <rect x="88" y="130" width="782" height="440" rx="12" fill="#fff" stroke="#E2DDD4" stroke-width="1" filter="url(#shadow)"/>

  <!-- Day headers -->
  <text x="134" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">LUN</text>
  <text x="246" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">MAR</text>
  <text x="358" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">MIÉ</text>
  <text x="470" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">JUE</text>
  <text x="582" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">VIE</text>
  <text x="694" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">SÁB</text>
  <text x="806" y="158" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A8F78" text-anchor="middle">DOM</text>

  <!-- Divider -->
