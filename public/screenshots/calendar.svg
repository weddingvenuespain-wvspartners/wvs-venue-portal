  <text x="246" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">22</text>
  <text x="358" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">23</text>
  <text x="470" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">24</text>
  <text x="582" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">25</text>
  <!-- Sep 26 - Negociación -->
  <rect x="662" y="370" width="64" height="56" rx="8" fill="#fef7ec" stroke="#f5deb3" stroke-width="1"/>
  <text x="694" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8a6d2b" text-anchor="middle">26</text>
  <text x="694" y="410" font-family="system-ui, sans-serif" font-size="8" fill="#8a6d2b" text-anchor="middle">A &amp; D</text>
  <text x="806" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">27</text>

