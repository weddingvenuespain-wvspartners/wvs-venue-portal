  <rect x="214" y="306" width="64" height="56" rx="8" fill="#eef6f0" stroke="#c3dfc9" stroke-width="1"/>
  <text x="246" y="326" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3d6b4a" text-anchor="middle">15</text>
  <text x="246" y="346" font-family="system-ui, sans-serif" font-size="8" fill="#3d6b4a" text-anchor="middle">S &amp; M</text>
  <text x="358" y="326" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">16</text>
  <text x="470" y="326" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">17</text>
  <text x="582" y="326" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#453D23" text-anchor="middle">18</text>
